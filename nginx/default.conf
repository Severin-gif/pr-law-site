server {
    listen 80;
    server_name www.letter-law.ru;
    return 301 https://letter-law.ru$request_uri;
}

server {
    listen 80;
    server_name letter-law.ru;

    root /usr/share/nginx/html;
    index index.html index.php;

    # API route for PHP runtime (without Node proxy)
    location = /api/request-audit {
        rewrite ^ /api/request-audit.php last;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php-fpm.sock;
    }

    location / {
        try_files $uri /index.html;
    }
}
